# 亚马逊选品系统 - Docker Compose 配置
# 包含：Web 服务 + PostgreSQL + Redis + 监控栈

version: '3.8'

services:
  # ==================== 主应用 ====================
  web:
    build: .
    container_name: amazon-selector-web
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://amazon:amazon123@db:5432/amazon
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - FLASK_ENV=production
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
      - ./results:/app/results
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - amazon-network

  # ==================== 数据库 ====================
  db:
    image: postgres:15-alpine
    container_name: amazon-selector-db
    environment:
      - POSTGRES_DB=amazon
      - POSTGRES_USER=amazon
      - POSTGRES_PASSWORD=amazon123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amazon -d amazon"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - amazon-network

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: amazon-selector-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - amazon-network

  # ==================== Prometheus 监控 ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: amazon-selector-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
    networks:
      - amazon-network
    depends_on:
      - web

  # ==================== Grafana 可视化 ====================
  grafana:
    image: grafana/grafana:latest
    container_name: amazon-selector-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - amazon-network
    depends_on:
      - prometheus

  # ==================== Alertmanager 告警 ====================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: amazon-selector-alertmanager
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager
    ports:
      - "9093:9093"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - amazon-network

# ==================== 数据卷 ====================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ==================== 网络 ====================
networks:
  amazon-network:
    driver: bridge
