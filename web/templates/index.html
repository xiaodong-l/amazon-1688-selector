<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 亚马逊选品系统 v2.1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        
        /* 头部 */
        header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        header p { font-size: 1.1em; opacity: 0.9; }
        
        /* 导航 */
        .nav {
            text-align: center;
            margin-bottom: 20px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            margin: 0 8px;
            border: 2px solid white;
            border-radius: 8px;
            transition: all 0.2s;
            font-weight: bold;
            display: inline-block;
        }
        .nav a:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        .nav a.active { background: rgba(255,255,255,0.3); }
        
        /* 卡片 */
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .card h2 { color: #667eea; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        /* 表单 */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-group textarea { min-height: 80px; resize: vertical; }
        
        /* 按钮 */
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-block;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-small { padding: 8px 16px; font-size: 14px; }
        
        /* 统计 */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-card .number { font-size: 2em; font-weight: bold; }
        .stat-card .label { font-size: 0.9em; opacity: 0.9; }
        
        /* 搜索 */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        /* 商品网格 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }
        
        /* 商品卡片 */
        .product-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-color: #667eea;
        }
        .product-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .product-asin {
            color: #666;
            font-size: 0.85em;
            margin-bottom: 12px;
            font-family: monospace;
        }
        .product-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9em;
        }
        .meta-item .icon { font-size: 1.2em; }
        
        /* 评分框 */
        .score-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }
        .score-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .score-title { font-weight: bold; }
        .score-number { font-size: 2em; font-weight: bold; }
        .score-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .score-item {
            background: rgba(255,255,255,0.15);
            padding: 8px;
            border-radius: 6px;
            text-align: center;
        }
        .score-item .label { font-size: 0.75em; opacity: 0.9; margin-bottom: 4px; }
        .score-item .value { font-size: 1.1em; font-weight: bold; }
        .score-item .weight { font-size: 0.65em; opacity: 0.8; }
        .bar {
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: white;
            border-radius: 2px;
            transition: width 0.3s;
        }
        
        /* 徽章 */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .badge-hot { background: linear-gradient(135deg, #ff6b6b, #ee5a6f); color: white; }
        .badge-fast { background: linear-gradient(135deg, #ffa502, #ff7f50); color: white; }
        .badge-stable { background: linear-gradient(135deg, #2ed573, #7bed9f); color: white; }
        .badge-slow { background: linear-gradient(135deg, #ffd43b, #fab005); color: #333; }
        
        /* 增强指标 */
        .enhanced-metrics {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            display: none;
        }
        .enhanced-metrics.show { display: block; }
        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            font-size: 0.85em;
        }
        .metric-row:last-child { border-bottom: none; }
        .metric-label { opacity: 0.9; }
        .metric-value { font-weight: bold; }
        .forecast-box {
            background: rgba(255,255,255,0.15);
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
        }
        .forecast-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85em;
        }
        .toggle-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .toggle-btn:hover { background: rgba(255,255,255,0.3); }
        
        /* 链接按钮 */
        .product-link {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            background: #FF9900;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .product-link:hover { background: #FF8800; transform: translateY(-2px); }
        
        /* 加载状态 */
        .loading { text-align: center; padding: 40px; color: #666; }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 无数据 */
        .no-data { text-align: center; padding: 60px; color: #999; }
        
        /* 风险提示 */
        .risk-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: bold;
            margin-left: 5px;
        }
        .risk-low { background: #d4edda; color: #155724; }
        .risk-medium { background: #fff3cd; color: #856404; }
        .risk-high { background: #f8d7da; color: #721c24; }
        
        /* 响应式 */
        @media (max-width: 768px) {
            header h1 { font-size: 1.8em; }
            .product-grid { grid-template-columns: 1fr; }
            .score-details { grid-template-columns: 1fr; }
            .nav a { display: block; margin: 5px 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 亚马逊选品系统</h1>
            <p>Amazon 数据采集 → 趋势分析 → Top20 潜力商品</p>
        </header>

        <div class="nav">
            <a href="/" class="active">🏠 首页</a>
            <a href="/charts">📊 可视化</a>
            <a href="/api/results">📄 API 文档</a>
        </div>

        <!-- 开始选品 -->
        <div class="card">
            <h2>🚀 开始选品</h2>
            <div class="form-group">
                <label>关键词 (每行一个)</label>
                <textarea id="keywords" placeholder="wireless earbuds&#10;phone case&#10;laptop stand">wireless earbuds
phone case
laptop stand</textarea>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="includeSuppliers"> 包含 1688 供应商匹配
                </label>
            </div>
            <button class="btn" onclick="runWorkflow()" id="runBtn">🎯 开始选品</button>
            <div id="status" style="margin-top: 15px;"></div>
        </div>

        <!-- 统计 -->
        <div class="stats" id="stats" style="display: none;">
            <div class="stat-card">
                <div class="number" id="productCount">0</div>
                <div class="label">📦 采集商品</div>
            </div>
            <div class="stat-card">
                <div class="number" id="topCount">0</div>
                <div class="label">🏆 Top 商品</div>
            </div>
            <div class="stat-card">
                <div class="number" id="avgScore">0</div>
                <div class="label">📊 平均评分</div>
            </div>
            <div class="stat-card">
                <div class="number" id="dataSource">-</div>
                <div class="label">💾 数据源</div>
            </div>
        </div>

        <!-- 商品列表 -->
        <div class="card">
            <h2>🏆 Top 潜力商品</h2>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜索商品标题或 ASIN..." oninput="filterProducts()">
            </div>
            
            <div id="loading" class="loading" style="display: none;">
                <div class="loading-spinner"></div>
                <p>正在加载商品数据...</p>
            </div>
            
            <div id="noData" class="no-data">
                <h3>😕 暂无商品数据</h3>
                <p>点击上方"开始选品"按钮采集数据</p>
            </div>
            
            <div class="product-grid" id="productGrid"></div>
        </div>
    </div>

    <script>
        let allProducts = [];

        // 运行工作流
        async function runWorkflow() {
            const btn = document.getElementById('runBtn');
            const status = document.getElementById('status');
            const keywords = document.getElementById('keywords').value
                .split('\n')
                .filter(k => k.trim())
                .map(k => k.trim());
            
            if (keywords.length === 0) {
                alert('请输入至少一个关键词');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '⏳ 执行中...';
            status.innerHTML = '<p>🔄 正在采集数据，请稍候...</p>';
            
            try {
                const response = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        keywords: keywords,
                        include_suppliers: document.getElementById('includeSuppliers').checked
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    status.innerHTML = `<p style="color: #28a745;">✅ 完成！采集 ${data.result.total_products} 个商品，筛选 ${data.result.top_products_count} 个 Top 商品</p>`;
                    setTimeout(() => loadProducts(), 1000);
                } else {
                    status.innerHTML = `<p style="color: #dc3545;">❌ 失败：${data.error}</p>`;
                }
            } catch (error) {
                status.innerHTML = `<p style="color: #dc3545;">❌ 错误：${error.message}</p>`;
            } finally {
                btn.disabled = false;
                btn.textContent = '🎯 开始选品';
            }
        }

        // 加载商品
        async function loadProducts() {
            const loading = document.getElementById('loading');
            const noData = document.getElementById('noData');
            const grid = document.getElementById('productGrid');
            const stats = document.getElementById('stats');
            
            loading.style.display = 'block';
            noData.style.display = 'none';
            grid.style.display = 'none';
            
            try {
                const response = await fetch('/api/products');
                const data = await response.json();
                
                if (data.success && data.products.length > 0) {
                    allProducts = data.products;
                    renderProducts(data.products);
                    
                    // 更新统计
                    document.getElementById('productCount').textContent = data.count;
                    document.getElementById('topCount').textContent = data.products.filter(p => p.trend_score >= 50).length;
                    const avg = data.products.reduce((sum, p) => sum + (p.trend_score || 0), 0) / data.count;
                    document.getElementById('avgScore').textContent = avg.toFixed(1);
                    document.getElementById('dataSource').textContent = data.data_source === 'enhanced' ? '增强版' : '基础版';
                    
                    stats.style.display = 'grid';
                    loading.style.display = 'none';
                    grid.style.display = 'grid';
                } else {
                    loading.style.display = 'none';
                    noData.style.display = 'block';
                }
            } catch (error) {
                console.error('加载失败:', error);
                loading.innerHTML = `<p style="color: #dc3545;">❌ 加载失败：${error.message}</p>`;
            }
        }

        // 渲染商品
        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            
            products.forEach(product => {
                const card = createProductCard(product);
                grid.appendChild(card);
            });
        }

        // 创建商品卡片
        function createProductCard(product) {
            const div = document.createElement('div');
            div.className = 'product-card';
            
            // 徽章
            const badgeClass = getBadgeClass(product.trend_label);
            const badgeText = product.trend_label || '➡️ 稳定发展';
            
            // 评分说明
            const metrics = product.metrics || {};
            const scoreExplain = {
                sales: (product.sales_growth || metrics.sales_growth || 0).toFixed(1),
                review: (product.review_growth || metrics.review_growth || 0).toFixed(1),
                bsr: (product.bsr_improvement || metrics.bsr_improvement || 0).toFixed(1)
            };
            
            // 增强指标
            const enhancedMetrics = {
                profit_margin: (metrics.profit_margin || 0).toFixed(1),
                market_saturation: (metrics.market_saturation || 0).toFixed(1),
                growth_sustainability: (metrics.growth_sustainability || 0).toFixed(1),
                risk_score: (metrics.risk_score || 0).toFixed(1)
            };
            
            // 置信度
            const confidence = (product.confidence || 0).toFixed(2);
            
            // 风险等级样式
            const riskClass = getRiskClass(product.risk_level);
            
            // 30 天预测
            const forecast = product.forecast_30d || null;
            
            div.innerHTML = `
                <div class="product-title">${product.title || 'Unknown Product'}</div>
                <div class="product-asin">ASIN: ${product.asin || 'N/A'}</div>
                
                <div class="product-meta">
                    <div class="meta-item">
                        <span class="icon">💰</span>
                        <span>${product.price_currency || '$'}${(product.price_value || 0).toFixed(2)}</span>
                    </div>
                    <div class="meta-item">
                        <span class="icon">⭐</span>
                        <span>${(product.rating || 0).toFixed(1)} (${(product.ratings_total || 0).toLocaleString()})</span>
                    </div>
                    ${product.is_prime ? '<div class="meta-item"><span class="icon">✓</span><span>Prime</span></div>' : ''}
                    ${product.is_best_seller ? '<div class="meta-item"><span class="icon">🏆</span><span>Best Seller</span></div>' : ''}
                    ${product.is_amazon_choice ? '<div class="meta-item"><span class="icon">✓</span><span>Amazon Choice</span></div>' : ''}
                </div>
                
                <div class="score-box">
                    <div class="score-header">
                        <div>
                            <span class="score-title">📊 趋势评分</span>
                            <span class="badge ${badgeClass}" style="margin-left: 10px;">${badgeText}</span>
                            ${product.risk_level ? `<span class="risk-badge ${riskClass}">${product.risk_level}</span>` : ''}
                        </div>
                        <span class="score-number">${(product.trend_score || 0).toFixed(1)}<span style="font-size:0.5em; opacity:0.8">/100</span></span>
                    </div>
                    <div class="score-details">
                        <div class="score-item">
                            <div class="label">📈 销量增长</div>
                            <div class="value">${scoreExplain.sales}</div>
                            <div class="weight">权重 30%</div>
                            <div class="bar"><div class="bar-fill" style="width: ${Math.min(100, scoreExplain.sales)}%"></div></div>
                        </div>
                        <div class="score-item">
                            <div class="label">💬 评论增速</div>
                            <div class="value">${scoreExplain.review}</div>
                            <div class="weight">权重 20%</div>
                            <div class="bar"><div class="bar-fill" style="width: ${Math.min(100, scoreExplain.review)}%"></div></div>
                        </div>
                        <div class="score-item">
                            <div class="label">🏆 BSR 排名</div>
                            <div class="value">${scoreExplain.bsr}</div>
                            <div class="weight">权重 20%</div>
                            <div class="bar"><div class="bar-fill" style="width: ${Math.min(100, scoreExplain.bsr)}%"></div></div>
                        </div>
                    </div>
                    
                    <button class="toggle-btn" onclick="toggleMetrics(this)">🔍 查看增强指标 (v2.1)</button>
                    
                    <div class="enhanced-metrics">
                        <div class="metric-row">
                            <span class="metric-label">💰 利润率估算</span>
                            <span class="metric-value">${enhancedMetrics.profit_margin}/100</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">📊 市场饱和度</span>
                            <span class="metric-value">${enhancedMetrics.market_saturation}/100 <span style="opacity:0.7">(越高越不饱和)</span></span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">📈 增长持续性</span>
                            <span class="metric-value">${enhancedMetrics.growth_sustainability}/100</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">⚠️ 风险评分</span>
                            <span class="metric-value">${enhancedMetrics.risk_score}/100 <span style="opacity:0.7">(越低越好)</span></span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">✅ 置信度</span>
                            <span class="metric-value">${confidence}</span>
                        </div>
                        
                        ${forecast ? `
                        <div class="forecast-box">
                            <div style="margin-bottom: 8px; font-weight: bold; opacity: 0.9;">🔮 30 天预测</div>
                            <div class="forecast-row">
                                <span>预测评分:</span>
                                <span>${forecast.score || 'N/A'}</span>
                            </div>
                            <div class="forecast-row">
                                <span>趋势:</span>
                                <span>${forecast.trend || 'N/A'}</span>
                            </div>
                            <div class="forecast-row">
                                <span>置信区间:</span>
                                <span>[${(forecast.confidence_interval?.low || 0).toFixed(1)}, ${(forecast.confidence_interval?.high || 0).toFixed(1)}]</span>
                            </div>
                        </div>
                        ` : '<div style="margin-top: 12px; opacity: 0.7; font-size: 0.85em;">📊 运行工作流以生成预测数据</div>'}
                    </div>
                </div>
                
                <a href="${product.link || '#'}" class="product-link" target="_blank">🛒 查看 Amazon</a>
            `;
            
            return div;
        }

        // 获取徽章样式
        function getBadgeClass(label) {
            if (!label) return 'badge-stable';
            if (label.includes('爆品') || label.includes('🔥')) return 'badge-hot';
            if (label.includes('快速') || label.includes('📈')) return 'badge-fast';
            if (label.includes('稳定') || label.includes('➡️')) return 'badge-stable';
            return 'badge-slow';
        }

        // 获取风险样式
        function getRiskClass(level) {
            if (!level) return 'risk-low';
            if (level.includes('高')) return 'risk-high';
            if (level.includes('中')) return 'risk-medium';
            return 'risk-low';
        }

        // 切换增强指标
        function toggleMetrics(btn) {
            const metricsDiv = btn.nextElementSibling;
            metricsDiv.classList.toggle('show');
            btn.textContent = metricsDiv.classList.contains('show') 
                ? '🔼 收起增强指标' 
                : '🔍 查看增强指标 (v2.1)';
        }

        // 搜索过滤
        function filterProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                (p.title || '').toLowerCase().includes(query) ||
                (p.asin || '').toLowerCase().includes(query)
            );
            renderProducts(filtered);
        }

        // 页面加载
        window.onload = async function() {
            await loadProducts();
        };
    </script>
</body>
</html>
