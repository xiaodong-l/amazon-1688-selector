<script>
/**
 * Navbar JavaScript Controller
 * Handles mobile menu toggle, user dropdown, and authentication state
 */
(function() {
    'use strict';
    
    // DOM Elements
    const navbarToggle = document.getElementById('navbarToggle');
    const navbarMenu = document.getElementById('navbarMenu');
    const userDropdownToggle = document.getElementById('userDropdownToggle');
    const userDropdownMenu = document.getElementById('userDropdownMenu');
    const logoutBtn = document.getElementById('logoutBtn');
    const authButtonsGuest = document.getElementById('authButtonsGuest');
    const authButtonsUser = document.getElementById('authButtonsUser');
    
    // State
    let isLoggedIn = false;
    let currentUser = null;
    
    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
        checkAuthState();
        setupEventListeners();
        highlightActivePage();
    });
    
    /**
     * Check authentication state from localStorage
     */
    function checkAuthState() {
        const token = localStorage.getItem('access_token');
        const user = localStorage.getItem('user_info');
        
        if (token && user) {
            try {
                currentUser = JSON.parse(user);
                isLoggedIn = true;
                updateUIForLoggedInUser(currentUser);
            } catch (e) {
                console.error('Failed to parse user info:', e);
                logout();
            }
        } else {
            isLoggedIn = false;
            currentUser = null;
            updateUIForGuest();
        }
    }
    
    /**
     * Update UI for logged in user
     */
    function updateUIForLoggedInUser(user) {
        if (authButtonsGuest) authButtonsGuest.style.display = 'none';
        if (authButtonsUser) authButtonsUser.style.display = 'flex';
        
        const userName = document.getElementById('userName');
        const userRole = document.getElementById('userRole');
        const dropdownUsername = document.getElementById('dropdownUsername');
        const dropdownEmail = document.getElementById('dropdownEmail');
        
        if (userName) userName.textContent = user.username || '用户';
        if (userRole) userRole.textContent = user.role || 'user';
        if (dropdownUsername) dropdownUsername.textContent = user.username || '用户';
        if (dropdownEmail) dropdownEmail.textContent = user.email || '';
    }
    
    /**
     * Update UI for guest user
     */
    function updateUIForGuest() {
        if (authButtonsGuest) authButtonsGuest.style.display = 'flex';
        if (authButtonsUser) authButtonsUser.style.display = 'none';
    }
    
    /**
     * Setup event listeners
     */
    function setupEventListeners() {
        // Mobile menu toggle
        if (navbarToggle) {
            navbarToggle.addEventListener('click', toggleMobileMenu);
        }
        
        // User dropdown toggle
        if (userDropdownToggle) {
            userDropdownToggle.addEventListener('click', toggleUserDropdown);
        }
        
        // Logout button
        if (logoutBtn) {
            logoutBtn.addEventListener('click', handleLogout);
        }
        
        // Close dropdowns when clicking outside
        document.addEventListener('click', function(e) {
            if (userDropdownMenu && !userDropdownMenu.contains(e.target) && 
                !userDropdownToggle?.contains(e.target)) {
                userDropdownMenu.classList.remove('show');
            }
        });
        
        // Handle mobile menu on route change
        window.addEventListener('popstate', function() {
            navbarMenu?.classList.remove('show');
            highlightActivePage();
        });
    }
    
    /**
     * Toggle mobile menu
     */
    function toggleMobileMenu() {
        navbarMenu?.classList.toggle('show');
    }
    
    /**
     * Toggle user dropdown
     */
    function toggleUserDropdown(e) {
        e.stopPropagation();
        userDropdownMenu?.classList.toggle('show');
    }
    
    /**
     * Handle logout
     */
    async function handleLogout() {
        try {
            const token = localStorage.getItem('access_token');
            
            // Call logout API
            if (token) {
                await fetch('/api/v2/auth/logout', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    },
                });
            }
        } catch (e) {
            console.error('Logout API call failed:', e);
        } finally {
            // Always clear local state
            logout();
        }
    }
    
    /**
     * Clear auth state and redirect
     */
    function logout() {
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');
        localStorage.removeItem('user_info');
        
        isLoggedIn = false;
        currentUser = null;
        
        updateUIForGuest();
        
        // Redirect to login or home
        if (window.location.pathname.includes('/auth/')) {
            window.location.href = '/';
        } else {
            // Show toast notification
            showToast('已成功退出登录');
        }
    }
    
    /**
     * Highlight active page in navigation
     */
    function highlightActivePage() {
        const currentPage = window.location.pathname;
        const navLinks = document.querySelectorAll('.nav-link');
        
        navLinks.forEach(link => {
            link.classList.remove('active');
            const href = link.getAttribute('href');
            if (href === currentPage || 
                (currentPage === '/' && href === '/') ||
                (currentPage.startsWith(href) && href !== '/')) {
                link.classList.add('active');
            }
        });
    }
    
    /**
     * Show toast notification
     */
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.textContent = message;
        toast.style.cssText = `
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 9999;
            animation: slideUp 0.3s ease;
        `;
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.style.animation = 'slideDown 0.3s ease';
            setTimeout(() => toast.remove(), 300);
        }, 2000);
    }
    
    // Add animations
    const style = document.createElement('style');
    style.textContent = `
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 1; transform: translateX(-50%) translateY(0); }
            to { opacity: 0; transform: translateX(-50%) translateY(20px); }
        }
    `;
    document.head.appendChild(style);
    
    // Expose for external use
    window.NavbarAuth = {
        checkAuthState,
        logout,
        isLoggedIn: () => isLoggedIn,
        getCurrentUser: () => currentUser,
    };
})();
</script>
