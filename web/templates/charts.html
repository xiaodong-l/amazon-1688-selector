<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 数据可视化 - 亚马逊选品系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        header p { font-size: 1.1em; opacity: 0.9; }
        .nav {
            text-align: center;
            margin-bottom: 20px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            margin: 0 10px;
            border: 2px solid white;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .nav a:hover { background: rgba(255,255,255,0.2); }
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .card h2 { color: #667eea; margin-bottom: 20px; }
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
        }
        .chart-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .chart-card img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .chart-card h3 {
            color: #333;
            margin: 15px 0 10px;
            font-size: 1.1em;
        }
        .chart-card p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-card .number { font-size: 2em; font-weight: bold; }
        .stat-card .label { font-size: 0.9em; opacity: 0.9; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .no-data { text-align: center; padding: 60px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 数据可视化中心</h1>
            <p>6 种分析图表 - 全方位数据洞察</p>
        </header>

        <div class="nav">
            <a href="/">🏠 首页</a>
            <a href="/charts">📊 可视化</a>
            <a href="/api/results">📄 API 文档</a>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="number" id="chartCount">0</div>
                <div class="label">图表数量</div>
            </div>
            <div class="stat-card">
                <div class="number" id="productCount">0</div>
                <div class="label">分析商品</div>
            </div>
            <div class="stat-card">
                <div class="number" id="updateTime">-</div>
                <div class="label">最后更新</div>
            </div>
        </div>

        <div class="card">
            <h2>📈 分析图表</h2>
            <div id="loading" class="loading">
                <p>🔄 正在加载图表...</p>
            </div>
            <div id="noData" class="no-data" style="display: none;">
                <h3>😕 暂无图表数据</h3>
                <p>请先运行选品工作流生成图表</p>
            </div>
            <div class="chart-grid" id="chartGrid" style="display: none;"></div>
        </div>
    </div>

    <script>
        async function loadCharts() {
            try {
                // 获取图表文件列表
                const response = await fetch('/api/charts');
                const data = await response.json();
                console.log('图表数据:', data);

                if (data.success) {
                    // 即使没有图表也显示提示
                    if (data.charts && data.charts.length > 0) {
                        renderCharts(data.charts);
                        document.getElementById('chartCount').textContent = data.charts.length;
                    } else {
                        document.getElementById('chartCount').textContent = '0';
                        document.getElementById('noData').innerHTML = `
                            <h3>😕 暂无图表数据</h3>
                            <p>请先运行选品工作流生成图表</p>
                            <p style="margin-top: 15px; font-size: 0.9em; color: #aaa;">
                                提示：运行完整工作流后，图表会自动保存在<br>
                                <code style="background: #f0f0f0; padding: 5px 10px; border-radius: 4px;">data/charts/</code> 目录
                            </p>
                        `;
                        document.getElementById('noData').style.display = 'block';
                        document.getElementById('loading').style.display = 'none';
                        return;
                    }
                    
                    document.getElementById('productCount').textContent = data.product_count || 20;
                    document.getElementById('updateTime').textContent = data.last_update ? 
                        new Date(data.last_update).toLocaleDateString() : '-';
                    
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('chartGrid').style.display = 'grid';
                } else {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('noData').style.display = 'block';
                }
            } catch (error) {
                console.error('加载图表失败:', error);
                document.getElementById('loading').innerHTML = `<p>❌ 加载失败：${error.message}</p>`;
            }
        }

        function renderCharts(charts) {
            const grid = document.getElementById('chartGrid');
            grid.innerHTML = '';

            charts.forEach(chart => {
                const card = document.createElement('div');
                card.className = 'chart-card';
                
                const icon = getChartIcon(chart.type);
                const desc = getChartDesc(chart.type);
                
                card.innerHTML = `
                    ${icon}
                    <h3>${chart.name}</h3>
                    <p>${desc}</p>
                    <a href="${chart.url}" class="btn" target="_blank">🔍 查看大图</a>
                `;
                grid.appendChild(card);
            });
        }

        function getChartIcon(type) {
            const icons = {
                'trend_bar': '📊',
                'price_dist': '💰',
                'scatter': '⭐',
                'radar': '🎯',
                'heatmap': '🔗',
                'dashboard': '📱'
            };
            return `<div style="font-size: 3em; margin-bottom: 10px;">${icons[type] || '📈'}</div>`;
        }

        function getChartDesc(type) {
            const descs = {
                'trend_bar': 'Top20 商品趋势评分对比，按潜力标签着色',
                'price_dist': '商品价格区间分布，含平均价/中位价统计',
                'scatter': '评分与评论数关系，颜色=趋势评分',
                'radar': '单商品三维度量对比 (销量/评论/BSR)',
                'heatmap': '各指标间皮尔逊相关系数分析',
                'dashboard': '四合一交互式综合分析面板'
            };
            return descs[type] || '数据可视化图表';
        }

        window.onload = loadCharts;
    </script>
</body>
</html>
